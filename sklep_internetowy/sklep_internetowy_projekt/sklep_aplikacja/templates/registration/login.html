{% extends "sklep_aplikacja/bazowy.html" %}

{% block title %}Logowanie{% endblock %}

{% block content %}
  <h1>Logowanie</h1>

  {% if form.errors %}
    <p class="text-danger">Niepoprawny login lub hasło.</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Zaloguj się</button>
  </form>
{% endblock %}
